# APPLIACTIONS BLUR & OPACITY
windowrule {
    name = noblur
    match:tag = multimedia_video*
}

windowrule {
    name = opacity 1.0
    match:tag = multimedia_video*
}

windowrule {
    name = opacity 0.8
    match:tag = settings*
}

windowrule {
    name = opacity 0.8
    match:class = ^(org.gnome.Nautilus)$
}

windowrule {
    name = opacity 0.9
    match:class = ^(gedit|org.gnome.TextEditor|mousepad)$
}

windowrule {
    name = opacity 0.9
    match:class = ^(org.pulseaudio.pavucontrol)$
}

windowrule {
    name = opacity 0.9
    match:class = ^(kitty)$
}

windowrule {
    name = opacity 0.85 override 0.7 override 1 override
    match:class = ^(discord|vesktop|org.telegram.desktop)$
}

windowrule {
    name = opacity 0.8 override 0.6 override 1 override
    match:class = ^(Spotify)$
}

windowrule {
    name = opacity 0.9 override 0.7 override 1 override
    match:class = ^(zen)$
}

# FLOATING & SIZING
windowrule {
    name = float
    match:tag = settings*
}

windowrule {
    name = float
    match:tag = viewer*
}

windowrule {
    name = float
    match:tag = multimedia_video*
}

windowrule {
    name = size 900 506
    match:tag = multimedia_video*
}

windowrule {
    name = float
    match:class = ^(org.pulseaudio.pavucontrol)$
}

windowrule {
    name = size 50% 60%
    match:class = ^(org.pulseaudio.pavucontrol)$
}

# SYSTEM BEHAVIOR
windowrule {
    name = suppressevent maximize
    match:class = .*
}

windowrule {
    name = nofocus
    match:class = ^$
    match:title = ^$
    match:xwayland = 1
    match:float = 1
}

# DIALOGUES
windowrule {
    name = float
    match:title = ^(Save As|Save a File|Pick Files)$
}

windowrule {
    name = size 50% 60%
    match:title = ^(Save As|Save a File|Pick Files)$
}

windowrule {
    name = center
    match:title = ^(Save As|Save a File|Pick Files)$
}

windowrule {
    name = float
    match:initial_title = Open Files
}

windowrule {
    name = size 70% 60%
    match:initial_title = Open Files
}
