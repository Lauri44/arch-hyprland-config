layerrule {
    name = ignorealpha 0.5
    match:namespace = waybar
}
layerrule {
    name = ignorealpha 0.5
    match:tag = notif*
}
layerrule {
    name = blur
    match:namespace = logout_dialog
}

# SWAYNC BLUR & XRAY
layerrule {
    name = blur
    match:namespace = swaync-control-center
}
layerrule {
    name = blur
    match:namespace = swaync-notification-window
}
layerrule {
    name = ignorezero
    match:namespace = swaync-control-center
}
layerrule {
    name = ignorezero
    match:namespace = swaync-notification-window
}
layerrule {
    name = ignorealpha 0.5
    match:namespace = swaync-control-center
}
layerrule {
    name = ignorealpha 0.5
    match:namespace = swaync-notification-window
}
layerrule {
    name = xray 0
    match:namespace = swaync-control-center
}
layerrule {
    name = xray 0
    match:namespace = swaync-notification-window
}
# FLOAT
windowrule {
    name = float
    match:tag = settings*
}

windowrule {
    name = float
    match:tag = viewer*
}

windowrule {
    name = float
    match:tag = multimedia_video*
}

windowrule {
    name = size 900 506
    match:tag = multimedia_video*
}

windowrule {
    name = float
    match:class = ^(org.pulseaudio.pavucontrol)$
}

windowrule {
    name = size 50% 60%
    match:class = ^(org.pulseaudio.pavucontrol)$
}

# Ignore maximize requests
windowrule {
    name = suppressevent maximize
    match:class = .*
}

# Fix XWayland dragging issues
windowrule {
    name = nofocus
    match:class = ^$
    match:title = ^$
    match:xwayland = 1
    match:float = 1
    match:fullscreen = 0
    match:pin = 0
}

